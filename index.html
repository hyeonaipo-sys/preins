<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>pre ins</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#0095f6;--red:#ed4956;--border:#c8c8c8;--muted:#8e8e8e;
  --text:#262626;--bg:#fafafa;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --grad:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
}
body{background:#efefef;font-family:var(--font);color:var(--text);display:flex;flex-direction:column;align-items:center;min-height:100vh;}
.app{width:100%;max-width:470px;min-height:100vh;background:#fff;display:flex;flex-direction:column;box-shadow:0 2px 20px rgba(0,0,0,.12);border:1px solid var(--border);}

/* Header */
.top-header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:44px;border-bottom:1px solid var(–border);background:#fff;position:sticky;top:0;z-index:60;}
.ig-logo{font:600 20px/1 var(–font);letter-spacing:0;}
.top-icons{display:flex;gap:16px;align-items:center;}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;color:var(–text);}

/* Page tabs */
.nav-tabs{display:flex;border-bottom:1px solid var(–border);background:#fff;position:sticky;top:44px;z-index:59;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 0 7px;cursor:pointer;border-bottom:2px solid transparent;color:var(–muted);gap:3px;font-size:10px;font-weight:600;transition:all .15s;margin-bottom:-1px;}
.nav-tab.active{border-bottom-color:var(–text);color:var(–text);}

/* Stories */
.stories-bar{display:flex;gap:14px;padding:10px 16px 14px;overflow-x:auto;border-bottom:1.5px solid var(–border);scrollbar-width:none;flex-shrink:0;}
.stories-bar::-webkit-scrollbar{display:none;}
.story-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer;}
.story-ring{width:58px;height:58px;border-radius:50%;padding:2.5px;background:var(–grad);}
.story-ring.seen{background:var(–border);}
.story-ava{width:100%;height:100%;border-radius:50%;background:#efefef;border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;position:relative;}
.story-plus{position:absolute;bottom:-2px;right:-2px;width:20px;height:20px;background:var(–blue);border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;line-height:1;}
.story-name{font-size:11px;color:var(–text);max-width:62px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Feed page */
.feed-page{display:flex;flex-direction:column;padding-bottom:72px;}
.feed-post{border-bottom:1px solid var(–border);}.feed-post+.feed-post{border-top:none;}
.post-header{display:flex;align-items:center;padding:10px 12px;gap:10px;border-bottom:1px solid var(–border);}
.post-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#c13584,#f77737);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;border:1px solid var(–border);}
.post-user{flex:1;}
.post-username{font-size:13px;font-weight:600;}
.post-sublabel{font-size:11px;color:var(–muted);}
.post-more-btn{background:none;border:none;cursor:pointer;padding:4px 8px;font-size:20px;color:var(–text);line-height:1;}

/* Carousel */
.carousel-wrap{position:relative;width:100%;overflow:hidden;background:#000;aspect-ratio:1;}
.carousel-track{display:flex;height:100%;will-change:transform;}
.carousel-slide{flex-shrink:0;width:100%;height:100%;}
.carousel-slide img{width:100%;height:100%;object-fit:cover;display:block;}
.carousel-counter{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px;}
.car-dot-row{display:flex;justify-content:center;gap:4px;padding:8px 0 4px;}
.car-dot{width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,.15);transition:all .2s;cursor:pointer;}
.car-dot.active{background:var(–blue);transform:scale(1.15);}
.car-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.9);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 5px rgba(0,0,0,.25);z-index:5;font-size:14px;font-weight:600;}
.car-arrow.prev{left:10px;}
.car-arrow.next{right:10px;}
.car-arrow.hidden{display:none;}
.swipe-layer{position:absolute;inset:0;z-index:4;}
.post-edit-hint{position:absolute;top:10px;left:12px;background:rgba(0,0,0,.55);border:none;border-radius:16px;padding:4px 10px;cursor:pointer;color:#fff;font-size:12px;font-weight:600;z-index:6;opacity:0;transition:opacity .2s;pointer-events:none;}
.carousel-wrap:hover .post-edit-hint{opacity:1;pointer-events:all;}

/* Post actions */
.post-actions{display:flex;align-items:center;padding:8px 12px 4px;gap:2px;border-top:1px solid var(–border);}
.act-btn{background:none;border:none;cursor:pointer;padding:5px 6px;display:flex;align-items:center;color:var(–text);transition:transform .12s;}
.act-btn:active{transform:scale(.82);}
.save-btn{margin-left:auto;}
.post-likes{padding:0 12px 4px;font-size:13px;font-weight:600;}
.post-caption{padding:0 12px 6px;font-size:14px;line-height:1.5;}
.post-caption .uname{font-weight:600;}
.post-comments{padding:0 12px 2px;font-size:14px;color:var(–muted);}
.post-time{padding:2px 12px 10px;font-size:10px;color:var(–muted);text-transform:uppercase;letter-spacing:.3px;}
.add-comment-row{display:flex;align-items:center;padding:8px 12px;border-top:1.5px solid var(–border);gap:10px;}
.comment-ava{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#c13584,#f77737);flex-shrink:0;}
.comment-input{flex:1;border:none;outline:none;font-family:var(–font);font-size:14px;color:var(–text);background:transparent;}
.comment-input::placeholder{color:var(–muted);}

/* Empty feed */
.empty-feed{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:16px;color:var(–muted);text-align:center;min-height:60vh;}
.empty-feed h3{font-size:20px;font-weight:300;color:var(–text);}
.empty-feed p{font-size:14px;line-height:1.7;}
.empty-btn{background:var(–blue);color:#fff;border:none;border-radius:8px;padding:11px 28px;font-family:var(–font);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;}

/* Profile page */
.profile-page{display:flex;flex-direction:column;padding-bottom:72px;}
.profile-section{padding:16px;display:flex;flex-direction:column;gap:14px;border-bottom:1px solid var(–border);}
.profile-top{display:flex;align-items:center;gap:20px;}
.profile-ava{width:77px;height:77px;border-radius:50%;border:1px solid var(–border);background:linear-gradient(135deg,#c13584,#f77737);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;}
.profile-stats{display:flex;flex:1;justify-content:space-around;}
.stat{display:flex;flex-direction:column;align-items:center;gap:1px;}
.stat-n{font-size:16px;font-weight:600;}
.stat-l{font-size:12px;}
.bio-name-in{font-size:13px;font-weight:600;outline:none;border:none;background:transparent;font-family:var(–font);width:100%;padding:2px 4px;border-radius:4px;transition:background .2s;color:var(–text);}
.bio-name-in:focus{background:#f0f0f0;}
.bio-desc-in{font-size:13px;outline:none;border:none;background:transparent;font-family:var(–font);width:100%;resize:none;padding:2px 4px;border-radius:4px;transition:background .2s;line-height:1.5;color:var(–text);}
.bio-desc-in:focus{background:#f0f0f0;}
.bio-link{font-size:13px;color:#00376b;font-weight:500;padding-left:4px;}
.profile-btns{display:flex;gap:6px;}
.pro-btn{flex:1;padding:6px;border-radius:8px;font-family:var(–font);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(–border);background:#efefef;color:var(–text);}
.pro-btn:hover{background:#e0e0e0;}
.pro-btn-sm{flex:0;padding:6px 10px;}

/* Grid */
.grid-tabs{display:flex;border-bottom:1px solid var(–border);}
.grid-tab{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;cursor:pointer;border-bottom:2px solid transparent;color:var(–muted);margin-bottom:-1px;}
.grid-tab.active{border-bottom-color:var(–text);color:var(–text);}
.profile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.grid-cell{aspect-ratio:3/4;background:var(–border);cursor:pointer;overflow:hidden;position:relative;}
.grid-cell img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;transition:filter .2s;}
.grid-cell:hover img{filter:brightness(.75);}
.gc-order{position:absolute;top:5px;left:5px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.gc-multi{position:absolute;top:6px;right:6px;}
.grid-cell.dragging{opacity:.3;}
.grid-cell.drag-target{outline:3px solid var(–blue);outline-offset:-3px;}

<script>
// ── Constants ─────────────────────────────────────────
const FILTERS = [
  {name:'원본',       css:'none'},
  {name:'Clarendon', css:'brightness(1.1) contrast(1.2) saturate(1.35)'},
  {name:'Gingham',   css:'brightness(1.05) hue-rotate(-10deg) saturate(0.9)'},
  {name:'Juno',      css:'brightness(1.08) saturate(1.4) sepia(0.1)'},
  {name:'Lark',      css:'brightness(1.1) contrast(0.9) saturate(1.15)'},
  {name:'Ludwig',    css:'contrast(1.15) sepia(0.05) saturate(1.1)'},
  {name:'Moon',      css:'grayscale(1) brightness(1.1) contrast(1.1)'},
  {name:'Reyes',     css:'sepia(0.4) contrast(0.85) brightness(1.1) saturate(0.75)'},
  {name:'Sierra',    css:'contrast(0.9) brightness(1.1) hue-rotate(5deg) saturate(1.2)'},
  {name:'Slumber',   css:'saturate(0.7) brightness(1.05) sepia(0.15)'},
  {name:'Toaster',   css:'contrast(1.5) brightness(0.9) saturate(0.9) sepia(0.2)'},
  {name:'Valencia',  css:'contrast(1.08) brightness(1.08) sepia(0.15)'},
];
const ADJ_DEFS = [
  {key:'brightness', name:'밝기',   min:50,  max:150, def:100, ico:'☀️'},
  {key:'contrast',   name:'대비',   min:50,  max:150, def:100, ico:'◑'},
  {key:'saturate',   name:'채도',   min:0,   max:200, def:100, ico:'🎨'},
  {key:'sepia',      name:'따뜻함', min:0,   max:100, def:0,   ico:'🌅'},
  {key:'blur',       name:'흐림',   min:0,   max:100, def:0,   ico:'🌫'},
];
const TIMES = ['방금 전','1분 전','7분 전','23분 전','1시간 전','3시간 전','어제','2일 전'];

// ── State ─────────────────────────────────────────────
let posts = [];        // [{id, photos:[{id,src,filter,adj}], caption, liked, likes, slide}]
let selPostIdx = -1;   // index into posts[]
let selPhotoIdx = 0;   // index into post.photos[]
let sheetTab = 'filter';
let dragSrcIdx = null;
let timeCounter = 0;
let idCounter = 1;

// ── Helpers ───────────────────────────────────────────
function newId() { return idCounter++; }

function makeAdj() {
  return {brightness:100, contrast:100, saturate:100, sepia:0, blur:0};
}

function makePhoto(src) {
  return {id: newId(), src, filter:'none', adj: makeAdj(), cropScale:100, cropX:0, cropY:0, cropRatio:'1:1'};
}

function makePost(photos) {
  return {
    id: newId(),
    photos,
    caption: '',
    liked: false,
    likes: Math.floor(Math.random() * 300) + 10,
    slide: 0
  };
}

function cssFilter(photo) {
  const a = photo.adj;
  let f = `brightness(${a.brightness}%) contrast(${a.contrast}%) saturate(${a.saturate}%) sepia(${a.sepia}%)`;
  if (a.blur > 0) f += ` blur(${(a.blur * 0.03).toFixed(2)}px)`;
  if (photo.filter && photo.filter !== 'none') f += ' ' + photo.filter;
  return f;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function getUsername() {
  return document.getElementById('bio-name').value || 'your_name';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── File handling ─────────────────────────────────────
function readFilesAsSrcs(files, cb) {
  const srcs = [];
  let done = 0;
  files.forEach((f, i) => {
    const r = new FileReader();
    r.onload = ev => { srcs[i] = ev.target.result; if (++done === files.length) cb(srcs); };
    r.readAsDataURL(f);
  });
}

document.getElementById('file-main').addEventListener('change', function(e) {
  const files = [...this.files].filter(f => f.type.startsWith('image/')).slice(0, 20);
  if (!files.length) { this.value = ''; return; }
  readFilesAsSrcs(files, srcs => {
    openPreEditor(srcs.map(makePhoto));
  });
  this.value = '';
});

// file-add handled in pre-editor script

// ── Main render ───────────────────────────────────────
function renderAll() {
  renderFeed();
  renderGrid();
  if (typeof renderHighlights === "function") renderHighlights();
  document.getElementById('post-count').textContent = posts.length;
  const u = getUsername();
  document.getElementById('my-story-name').textContent = u.length > 7 ? u.slice(0,7)+'…' : u;
}

// ── Feed ──────────────────────────────────────────────
function renderFeed() {
  const container = document.getElementById('feed-posts');
  container.innerHTML = '';

  if (!posts.length) {
    container.innerHTML = `
      <div class="empty-feed">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <h3>게시물을 추가해보세요</h3>
        <p>사진을 최대 20장씩 묶어서<br>피드에서 캐러셀로 미리 확인하세요</p>
        <button class="empty-btn" id="empty-add-btn">+ 게시물 추가</button>
      </div>`;
    document.getElementById('empty-add-btn').addEventListener('click', triggerAdd);
    return;
  }

  posts.forEach((post, pi) => {
    const el = buildPostEl(post, pi);
    container.appendChild(el);
  });
}

function buildPostEl(post, pi) {
  const uname = esc(getUsername());
  const n = post.photos.length;
  const slide = post.slide;

  const wrap = document.createElement('div');
  wrap.className = 'feed-post';

  // Header
  const header = document.createElement('div');
  header.className = 'post-header';
  header.innerHTML = `
    <div class="post-avatar">👤</div>
    <div class="post-user">
      <div class="post-username">${uname}</div>
      <div class="post-sublabel">${post.music ? '♪ ' + esc(post.music.title) + ' · ' + esc(post.music.artist) : '피드 미리보기'}</div>
    </div>`;
  const moreBtn = document.createElement('button');
  moreBtn.className = 'post-more-btn';
  moreBtn.textContent = '⋯';
  moreBtn.addEventListener('click', () => openSheet(pi));
  header.appendChild(moreBtn);
  wrap.appendChild(header);

  // Carousel
  const carWrap = document.createElement('div');
  carWrap.className = 'carousel-wrap';
  // Apply crop ratio of cover photo
  const coverPh = post.photos[0];
  if (coverPh && coverPh.cropRatio) {
    if (coverPh.cropRatio === '4:5') carWrap.style.aspectRatio = '4/5';
    else if (coverPh.cropRatio === '9:16') carWrap.style.aspectRatio = '9/16';
    else if (coverPh.cropRatio === 'orig') carWrap.style.aspectRatio = 'auto';
  }

  const track = document.createElement('div');
  track.className = 'carousel-track';
  track.style.transform = `translateX(-${slide * 100}%)`;
  post.photos.forEach(ph => {
    const slideEl = document.createElement('div');
    slideEl.className = 'carousel-slide';
    const img = document.createElement('img');
    img.src = ph.src;
    img.style.filter = cssFilter(ph);
    if (ph.cropScale && ph.cropScale !== 100) {
      img.style.transform = `scale(${ph.cropScale/100}) translate(${ph.cropX||0}px,${ph.cropY||0}px)`;
      img.style.transformOrigin = 'center';
    }
    slideEl.appendChild(img);
    track.appendChild(slideEl);
  });
  carWrap.appendChild(track);

  // Edit hint
  const hint = document.createElement('button');
  hint.className = 'post-edit-hint';
  hint.textContent = '✏️ 편집';
  hint.addEventListener('click', () => openSheet(pi));
  carWrap.appendChild(hint);

  wrap.appendChild(carWrap);

  if (n > 1) {
    // Counter (inside carWrap, appended after carWrap added to wrap)
    const cnt = document.createElement('div');
    cnt.className = 'carousel-counter';
    cnt.textContent = (slide + 1) + '/' + n;
    carWrap.appendChild(cnt);

    // Arrows
    const prev = document.createElement('button');
    prev.className = 'car-arrow prev' + (slide === 0 ? ' hidden' : '');
    prev.textContent = '‹';
    carWrap.appendChild(prev);

    const next = document.createElement('button');
    next.className = 'car-arrow next' + (slide === n - 1 ? ' hidden' : '');
    next.textContent = '›';
    carWrap.appendChild(next);

    // Dots row (sibling of carWrap, inside wrap)
    const dotRow = document.createElement('div');
    dotRow.className = 'car-dot-row';
    post.photos.forEach((_, di) => {
      const dot = document.createElement('div');
      dot.className = 'car-dot' + (di === slide ? ' active' : '');
      dotRow.appendChild(dot);
    });
    wrap.appendChild(dotRow);

    // Wire up — all elements exist now
    attachCarousel(carWrap, track, post, n, cnt, prev, next, dotRow);
  }

  // Actions
  const actions = document.createElement('div');
  actions.className = 'post-actions';

  const likeBtn = document.createElement('button');
  likeBtn.className = 'act-btn' + (post.liked ? ' liked' : '');
  likeBtn.innerHTML = heartSVG(post.liked);
  likeBtn.addEventListener('click', () => {
    post.liked = !post.liked;
    post.likes += post.liked ? 1 : -1;
    likeBtn.innerHTML = heartSVG(post.liked);
    likeBtn.className = 'act-btn' + (post.liked ? ' liked' : '');
    likesDiv.innerHTML = '좋아요 <strong>' + post.likes.toLocaleString() + '개</strong>';
  });
  actions.appendChild(likeBtn);

  actions.innerHTML += `
    <button class="act-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></button>
    <button class="act-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    <button class="act-btn save-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg></button>`;
  wrap.appendChild(actions);

  const likesDiv = document.createElement('div');
  likesDiv.className = 'post-likes';
  likesDiv.innerHTML = '좋아요 <strong>' + post.likes.toLocaleString() + '개</strong>';
  wrap.appendChild(likesDiv);

  // Caption block (always visible, editable inline)
  const capBlock = document.createElement('div');
  capBlock.className = 'post-caption-block';
  const capSpan = document.createElement('span');
  capSpan.className = 'uname';
  capSpan.textContent = uname + ' ';
  capBlock.appendChild(capSpan);
  const capText = document.createElement('span');
  capText.className = 'cap-inline-text';
  capText.contentEditable = 'true';
  capText.setAttribute('data-placeholder', '캡션을 입력하세요...');
  capText.textContent = post.caption || '';
  capText.addEventListener('input', () => { post.caption = capText.textContent.trim(); });
  capText.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); capText.blur(); } });
  capBlock.appendChild(capText);
  wrap.appendChild(capBlock);

  // Hashtag display
  if (post.caption) {
    const tags = post.caption.match(/#[\w가-힣]+/g);
    if (tags) {
      const tagDiv = document.createElement('div');
      tagDiv.className = 'post-hashtags';
      tagDiv.textContent = tags.join(' ');
      wrap.appendChild(tagDiv);
    }
  }

  // Comments section
  const commentsWrap = document.createElement('div');
  commentsWrap.className = 'comments-wrap';

  const time = document.createElement('div');
  time.className = 'post-time';
  time.textContent = TIMES[timeCounter++ % TIMES.length];
  wrap.appendChild(time);

  // Build addCommentRow BEFORE renderComments so it's in scope
  const addCommentRow = document.createElement('div');
  addCommentRow.className = 'add-comment-row';
  const commentAva = document.createElement('div');
  commentAva.className = 'comment-ava';
  const commentInput = document.createElement('input');
  commentInput.className = 'comment-input';
  commentInput.type = 'text';
  commentInput.placeholder = '댓글 달기...';
  const commentPostBtn = document.createElement('button');
  commentPostBtn.className = 'comment-post-btn';
  commentPostBtn.textContent = '게시';
  commentPostBtn.style.opacity = '0.3';
  commentInput.addEventListener('input', () => {
    commentPostBtn.style.opacity = commentInput.value.trim() ? '1' : '0.3';
  });
  commentPostBtn.addEventListener('click', () => {
    const txt = commentInput.value.trim();
    if (!txt) return;
    if (!post.comments) post.comments = [];
    post.comments.push({ user: getUsername(), text: txt });
    commentInput.value = '';
    commentPostBtn.style.opacity = '0.3';
    renderComments();
  });
  commentInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') commentPostBtn.click();
  });
  addCommentRow.appendChild(commentAva);
  addCommentRow.appendChild(commentInput);
  addCommentRow.appendChild(commentPostBtn);
  wrap.appendChild(addCommentRow);
  wrap.appendChild(commentsWrap);

  function renderComments() {
    commentsWrap.innerHTML = '';
    if (post.comments && post.comments.length > 0) {
      post.comments.forEach((c, ci) => {
        const row = document.createElement('div');
        row.className = 'comment-row';
        row.innerHTML = '<span class="comment-uname">' + esc(c.user) + '</span> <span class="comment-text">' + esc(c.text) + '</span>';
        const delBtn = document.createElement('button');
        delBtn.className = 'comment-del';
        delBtn.textContent = '×';
        delBtn.addEventListener('click', () => { post.comments.splice(ci, 1); renderComments(); });
        row.appendChild(delBtn);
        commentsWrap.appendChild(row);
      });
    }
  }
  renderComments();

  return wrap;
}

function heartSVG(liked) {
  const c = liked ? '#ed4956' : 'currentColor';
  const f = liked ? '#ed4956' : 'none';
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="${f}" stroke="${c}" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>`;
}

// ── Natural drag-follow carousel ──────────────────────
function attachCarousel(carWrap, track, post, n, cnt, prev, next, dotRow) {
  let startX = 0, startY = 0;
  let dragDx = 0;
  let isDragging = false;
  let isHoriz = null; // null=undecided, true=horiz, false=vert
  let startTime = 0;

  const SNAP_THRESHOLD = 0.22;  // fraction of width to auto-advance
  const VELOCITY_THRESHOLD = 0.3; // px/ms to auto-advance regardless of distance

  function getClientX(e) {
    return e.touches ? e.touches[0].clientX : e.clientX;
  }
  function getClientY(e) {
    return e.touches ? e.touches[0].clientY : e.clientY;
  }

  function setTrack(dx, animated) {
    const base = -(post.slide * 100);
    track.style.transition = animated
      ? 'transform 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94)'
      : 'none';
    track.style.transform = `translateX(calc(${base}% + ${dx}px))`;
  }

  function updateUI(idx) {
    if (cnt) cnt.textContent = (idx + 1) + '/' + n;
    if (prev) prev.classList.toggle('hidden', idx === 0);
    if (next) next.classList.toggle('hidden', idx === n - 1);
    if (dotRow) dotRow.querySelectorAll('.car-dot').forEach((d, i) =>
      d.classList.toggle('active', i === idx)
    );
  }

  // Wire up arrow buttons directly
  prev.addEventListener('click', (e) => { e.stopPropagation(); snapTo(post.slide - 1, true); });
  next.addEventListener('click', (e) => { e.stopPropagation(); snapTo(post.slide + 1, true); });
  // Dot clicks
  if (dotRow) dotRow.querySelectorAll('.car-dot').forEach((dot, di) => {
    dot.addEventListener('click', () => snapTo(di, true));
  });

  function snapTo(idx, animated) {
    idx = Math.max(0, Math.min(n - 1, idx));
    post.slide = idx;
    dragDx = 0;
    setTrack(0, animated);
    updateUI(idx);
  }

  function onStart(e) {
    if (e.type === 'mousedown' && e.button !== 0) return;
    isDragging = true;
    isHoriz = null;
    dragDx = 0;
    startX = getClientX(e);
    startY = getClientY(e);
    startTime = Date.now();
    track.style.transition = 'none';
    if (e.type === 'mousedown') {
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onEnd);
    }
  }

  function onMove(e) {
    if (!isDragging) return;
    const dx = getClientX(e) - startX;
    const dy = getClientY(e) - startY;

    // Decide axis on first meaningful move
    if (isHoriz === null && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
      isHoriz = Math.abs(dx) > Math.abs(dy);
    }
    if (!isHoriz) return; // vertical scroll — don't interfere

    if (e.cancelable) e.preventDefault();

    // Rubber-band at edges
    let resistance = 1;
    if ((post.slide === 0 && dx > 0) || (post.slide === n - 1 && dx < 0)) {
      resistance = 0.22;
    }
    dragDx = dx * resistance;
    setTrack(dragDx, false);
  }

  function onEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    if (e.type === 'mouseup') {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onEnd);
    }
    if (!isHoriz) return;

    const elapsed = Math.max(1, Date.now() - startTime);
    const velocity = Math.abs(dragDx) / elapsed; // px/ms
    const width = carWrap.offsetWidth;
    const frac = Math.abs(dragDx) / width;

    if (frac > SNAP_THRESHOLD || velocity > VELOCITY_THRESHOLD) {
      if (dragDx < 0) snapTo(post.slide + 1, true);
      else             snapTo(post.slide - 1, true);
    } else {
      // bounce back
      snapTo(post.slide, true);
    }
  }

  // Touch events
  carWrap.addEventListener('touchstart', onStart, {passive: true});
  carWrap.addEventListener('touchmove',  onMove,  {passive: false});
  carWrap.addEventListener('touchend',   onEnd,   {passive: true});
  // Mouse events (desktop)
  carWrap.addEventListener('mousedown', onStart);
  carWrap.style.cursor = 'grab';
  carWrap.addEventListener('mousedown', () => carWrap.style.cursor = 'grabbing');
  carWrap.addEventListener('mouseup',   () => carWrap.style.cursor = 'grab');

  // Set initial position without animation
  setTrack(0, false);
}

// ── Grid ──────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('profile-grid');
  grid.innerHTML = '';

  posts.forEach((post, pi) => {
    const cover = post.photos[0];
    const cell = document.createElement('div');
    cell.className = 'grid-cell';
    cell.draggable = true;

    const img = document.createElement('img');
    img.src = cover.src;
    img.style.filter = cssFilter(cover);
    cell.appendChild(img);

    const order = document.createElement('div');
    order.className = 'gc-order';
    order.textContent = pi + 1;
    cell.appendChild(order);

    if (post.photos.length > 1) {
      const badge = document.createElement('div');
      badge.className = 'gc-multi';
      badge.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><rect x="7" y="2" width="14" height="17" rx="2"/><rect x="3" y="6" width="14" height="17" rx="2" fill="none" stroke="white" stroke-width="2"/></svg>';
      cell.appendChild(badge);
    }

    cell.addEventListener('click', () => openSheet(pi));
    cell.addEventListener('dragstart', e => {
      dragSrcIdx = pi;
      setTimeout(() => cell.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    cell.addEventListener('dragend', () => { cell.classList.remove('dragging'); renderAll(); });
    cell.addEventListener('dragover', e => {
      e.preventDefault();
      grid.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('drag-target'));
      cell.classList.add('drag-target');
    });
    cell.addEventListener('dragleave', () => cell.classList.remove('drag-target'));
    cell.addEventListener('drop', e => {
      e.preventDefault();
      cell.classList.remove('drag-target');
      if (dragSrcIdx !== null && dragSrcIdx !== pi) {
        const moved = posts.splice(dragSrcIdx, 1)[0];
        posts.splice(pi, 0, moved);
        dragSrcIdx = null;
        renderAll();
      }
    });
    grid.appendChild(cell);
  });

  // Upload cell
  const up = document.createElement('div');
  up.className = 'grid-upload';
  up.innerHTML = '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>추가</span>';
  up.addEventListener('click', triggerAdd);
  grid.appendChild(up);

  // Padding
  const total = posts.length + 1;
  const rem = total % 3 === 0 ? 0 : 3 - (total % 3);
  for (let i = 0; i < rem; i++) {
    const e = document.createElement('div'); e.className = 'grid-empty'; grid.appendChild(e);
  }
}

// ── Sheet ─────────────────────────────────────────────
function openSheet(pi) {
  selPostIdx = pi;
  selPhotoIdx = 0;
  sheetTab = 'filter';
  const post = posts[pi];
  if (!post) return;
  document.getElementById('sheet-title').textContent = '게시물 편집 (' + post.photos.length + '장)';
  // reset tabs
  document.querySelectorAll('.stab').forEach((t, i) => t.classList.toggle('active', i === 0));
  renderStrip();
  renderSheetPreview();
  renderSheetBody();
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('edit-sheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('edit-sheet').classList.remove('open');
  renderAll();
}

function renderStrip() {
  const strip = document.getElementById('sheet-strip');
  strip.innerHTML = '';
  if (selPostIdx < 0) return;
  const post = posts[selPostIdx];
  post.photos.forEach((ph, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'strip-thumb' + (i === selPhotoIdx ? ' active' : '');

    const img = document.createElement('img');
    img.src = ph.src;
    img.style.filter = cssFilter(ph);
    thumb.appendChild(img);

    if (post.photos.length > 1) {
      const del = document.createElement('button');
      del.className = 'strip-del';
      del.textContent = '×';
      del.addEventListener('click', e => { e.stopPropagation(); removePhotoFromPost(i); });
      thumb.appendChild(del);
    }

    thumb.addEventListener('click', () => { selPhotoIdx = i; renderStrip(); renderSheetPreview(); renderSheetBody(); });
    strip.appendChild(thumb);
  });

  // Add photo button
  const addBtn = document.createElement('div');
  addBtn.className = 'strip-add';
  addBtn.textContent = '+';
  addBtn.title = '사진 추가';
  addBtn.addEventListener('click', () => document.getElementById('file-add').click());
  strip.appendChild(addBtn);
}

function removePhotoFromPost(i) {
  const post = posts[selPostIdx];
  if (!post || post.photos.length <= 1) return;
  post.photos.splice(i, 1);
  selPhotoIdx = Math.min(selPhotoIdx, post.photos.length - 1);
  document.getElementById('sheet-title').textContent = '게시물 편집 (' + post.photos.length + '장)';
  renderStrip();
  renderSheetPreview();
  renderSheetBody();
}

function renderSheetPreview() {
  if (selPostIdx < 0) return;
  const post = posts[selPostIdx];
  const ph = post.photos[selPhotoIdx];
  const img = document.getElementById('sheet-img');
  img.src = ph.src;
  img.style.filter = cssFilter(ph);
}

function renderSheetBody() {
  if (selPostIdx < 0) return;
  const post = posts[selPostIdx];
  const ph = post.photos[selPhotoIdx];
  const body = document.getElementById('sheet-body');
  body.innerHTML = '';

  if (sheetTab === 'filter') {
    const row = document.createElement('div');
    row.className = 'filter-row';
    FILTERS.forEach(f => {
      const item = document.createElement('div');
      item.className = 'fi' + (ph.filter === f.css ? ' active' : '');
      const thumb = document.createElement('div');
      thumb.className = 'fi-thumb';
      const img = document.createElement('img');
      img.src = ph.src;
      img.style.filter = f.css === 'none' ? 'none' : f.css;
      thumb.appendChild(img);
      const name = document.createElement('span');
      name.className = 'fi-name';
      name.textContent = f.name;
      item.appendChild(thumb);
      item.appendChild(name);
      item.addEventListener('click', () => {
        ph.filter = f.css;
        renderSheetPreview();
        renderStrip();
        renderSheetBody();
      });
      row.appendChild(item);
    });
    body.appendChild(row);

  } else if (sheetTab === 'adjust') {
    const list = document.createElement('div');
    list.className = 'adj-list';
    ADJ_DEFS.forEach(def => {
      const row = document.createElement('div');
      row.className = 'adj-row';
      const valSpan = document.createElement('span');
      valSpan.className = 'adj-v';
      valSpan.textContent = ph.adj[def.key];
      const slider = document.createElement('input');
      slider.type = 'range';
      slider.min = def.min;
      slider.max = def.max;
      slider.value = ph.adj[def.key];
      slider.addEventListener('input', () => {
        ph.adj[def.key] = +slider.value;
        valSpan.textContent = slider.value;
        renderSheetPreview();
        renderStrip();
      });
      row.innerHTML = `<div class="adj-ico">${def.ico}</div>`;
      const right = document.createElement('div');
      right.className = 'adj-right';
      const top = document.createElement('div');
      top.className = 'adj-top';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'adj-n';
      nameSpan.textContent = def.name;
      top.appendChild(nameSpan);
      top.appendChild(valSpan);
      right.appendChild(top);
      right.appendChild(slider);
      row.appendChild(right);
      list.appendChild(row);
    });
    body.appendChild(list);

  } else if (sheetTab === 'crop') {
    const post2 = posts[selPostIdx];
    const ph2 = post2.photos[selPhotoIdx];
    const cropWrap = document.createElement('div');
    cropWrap.className = 'crop-wrap';

    // Preview
    const previewBox = document.createElement('div');
    previewBox.className = 'crop-preview-box';
    // apply ratio
    const ratioMap = {'1:1':'aspect-ratio:1','4:5':'aspect-ratio:4/5','9:16':'aspect-ratio:9/16','原创':'aspect-ratio:auto'};
    if (ph2.cropRatio === '4:5') previewBox.style.aspectRatio = '4/5';
    else if (ph2.cropRatio === '9:16') previewBox.style.aspectRatio = '9/16';
    else if (ph2.cropRatio === 'orig') previewBox.style.aspectRatio = 'auto';
    else previewBox.style.aspectRatio = '1';

    const prevImg = document.createElement('img');
    prevImg.src = ph2.src;
    prevImg.style.filter = cssFilter(ph2);
    const sc = ph2.cropScale || 100;
    prevImg.style.transform = `scale(${sc/100}) translate(${ph2.cropX||0}px, ${ph2.cropY||0}px)`;
    prevImg.style.transformOrigin = 'center';
    prevImg.style.transition = 'transform .15s';

    // drag to pan
    let px=0,py=0,dragging=false;
    prevImg.addEventListener('mousedown', e=>{dragging=true;px=e.clientX;py=e.clientY;});
    window.addEventListener('mouseup', ()=>dragging=false);
    window.addEventListener('mousemove', e=>{
      if(!dragging) return;
      ph2.cropX=(ph2.cropX||0)+(e.clientX-px); ph2.cropY=(ph2.cropY||0)+(e.clientY-py);
      px=e.clientX;py=e.clientY;
      prevImg.style.transform=`scale(${(ph2.cropScale||100)/100}) translate(${ph2.cropX}px,${ph2.cropY}px)`;
    });
    prevImg.addEventListener('touchstart',e=>{dragging=true;px=e.touches[0].clientX;py=e.touches[0].clientY;},{passive:true});
    prevImg.addEventListener('touchend',()=>dragging=false,{passive:true});
    prevImg.addEventListener('touchmove',e=>{
      if(!dragging) return;
      ph2.cropX=(ph2.cropX||0)+(e.touches[0].clientX-px); ph2.cropY=(ph2.cropY||0)+(e.touches[0].clientY-py);
      px=e.touches[0].clientX;py=e.touches[0].clientY;
      prevImg.style.transform=`scale(${(ph2.cropScale||100)/100}) translate(${ph2.cropX}px,${ph2.cropY}px)`;
    },{passive:true});

    previewBox.appendChild(prevImg);
    cropWrap.appendChild(previewBox);

    // Ratio buttons
    const ratioRow = document.createElement('div');
    ratioRow.className = 'crop-ratio-row';
    [['1:1','정사각형'],['4:5','세로'],['9:16','스토리'],['orig','원본']].forEach(([r,label])=>{
      const btn = document.createElement('button');
      btn.className = 'crop-ratio-btn' + (ph2.cropRatio===r?' active':'');
      btn.textContent = label;
      btn.addEventListener('click',()=>{
        ph2.cropRatio=r; ph2.cropX=0; ph2.cropY=0;
        renderSheetBody();
      });
      ratioRow.appendChild(btn);
    });
    cropWrap.appendChild(ratioRow);

    // Scale slider
    const scaleRow = document.createElement('div');
    scaleRow.className = 'crop-scale-row';
    const scaleLabel = document.createElement('div');
    scaleLabel.className = 'crop-scale-label';
    const scaleValSpan = document.createElement('span');
    scaleValSpan.textContent = (ph2.cropScale||100) + '%';
    scaleLabel.innerHTML = '<span>확대/축소</span>';
    scaleLabel.appendChild(scaleValSpan);
    const scaleSlider = document.createElement('input');
    scaleSlider.type='range'; scaleSlider.min=100; scaleSlider.max=300; scaleSlider.value=ph2.cropScale||100;
    scaleSlider.addEventListener('input',()=>{
      ph2.cropScale=+scaleSlider.value;
      scaleValSpan.textContent=scaleSlider.value+'%';
      prevImg.style.transform=`scale(${ph2.cropScale/100}) translate(${ph2.cropX||0}px,${ph2.cropY||0}px)`;
    });
    scaleRow.appendChild(scaleLabel);
    scaleRow.appendChild(scaleSlider);
    cropWrap.appendChild(scaleRow);

    body.appendChild(cropWrap);

  } else if (sheetTab === 'music') {
    const post3 = posts[selPostIdx];
    const musicWrap = document.createElement('div');
    musicWrap.className = 'music-wrap';

    // Current music
    if (post3.music) {
      const cur = document.createElement('div');
      cur.className = 'music-current';
      const disc = document.createElement('div');
      disc.className = 'music-disc playing';
      disc.textContent = '🎵';
      const info = document.createElement('div');
      info.className = 'music-info';
      info.innerHTML = '<div class="music-title">'+esc(post3.music.title)+'</div><div class="music-artist">'+esc(post3.music.artist)+'</div>';
      const rmBtn = document.createElement('button');
      rmBtn.className = 'music-remove';
      rmBtn.textContent = '×';
      rmBtn.addEventListener('click',()=>{ post3.music=null; renderSheetBody(); });
      cur.appendChild(disc); cur.appendChild(info); cur.appendChild(rmBtn);
      musicWrap.appendChild(cur);
    }

    // Search
    const searchBox = document.createElement('div');
    searchBox.className = 'music-search-box';
    searchBox.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
    const searchInput = document.createElement('input');
    searchInput.placeholder = '노래 제목, 아티스트 검색...';
    searchInput.value = post3.music ? post3.music.title : '';
    searchBox.appendChild(searchInput);
    musicWrap.appendChild(searchBox);

    const SONGS = [
      {title:'YOUNG DRUG',artist:'CIFIKA',emoji:'🎸'},
      {title:'Messy P',artist:'grgr_playlist',emoji:'🎺'},
      {title:'제주도의 푸른 밤',artist:'태연',emoji:'🌊'},
      {title:'밤양갱',artist:'비비 (BIBI)',emoji:'🌙'},
      {title:'Supernova',artist:'에스파 (aespa)',emoji:'⭐'},
      {title:'Magnetic',artist:'ILLIT',emoji:'💫'},
      {title:'Love wins all',artist:'아이유 (IU)',emoji:'💛'},
      {title:'Greedy',artist:'Ariana Grande',emoji:'🎀'},
    ];

    function renderSuggestions(query) {
      sugList.innerHTML='';
      const filtered = query ? SONGS.filter(s=>s.title.toLowerCase().includes(query.toLowerCase())||s.artist.toLowerCase().includes(query.toLowerCase())) : SONGS;
      filtered.forEach(song=>{
        const item = document.createElement('div');
        item.className = 'music-suggestion-item';
        const disc2 = document.createElement('div');
        disc2.className = 'music-sug-disc';
        disc2.textContent = song.emoji;
        const info2 = document.createElement('div');
        info2.className = 'music-sug-info';
        info2.innerHTML = '<div class="music-sug-title">'+esc(song.title)+'</div><div class="music-sug-artist">'+esc(song.artist)+'</div>';
        const addBtn2 = document.createElement('button');
        addBtn2.className = 'music-sug-add';
        addBtn2.textContent = post3.music && post3.music.title===song.title ? '✓' : '추가';
        addBtn2.addEventListener('click',()=>{
          post3.music = {title:song.title, artist:song.artist, emoji:song.emoji};
          renderSheetBody();
        });
        item.appendChild(disc2); item.appendChild(info2); item.appendChild(addBtn2);
        sugList.appendChild(item);
      });
    }

    const sugList = document.createElement('div');
    sugList.className = 'music-suggestions';
    searchInput.addEventListener('input',()=>renderSuggestions(searchInput.value));
    musicWrap.appendChild(sugList);
    renderSuggestions('');
    body.appendChild(musicWrap);

  } else { // caption
    const area = document.createElement('div');
    area.className = 'cap-area';
    const box = document.createElement('textarea');
    box.className = 'cap-box';
    box.placeholder = '캡션 작성... #해시태그 @멘션';
    box.maxLength = 2200;
    box.value = post.caption;
    const meta = document.createElement('div');
    meta.className = 'cap-meta';
    const lenSpan = document.createElement('span');
    lenSpan.textContent = post.caption.length + '/2200';
    box.addEventListener('input', () => {
      post.caption = box.value;
      lenSpan.textContent = box.value.length + '/2200';
    });
    meta.appendChild(document.createTextNode('#해시태그 @멘션'));
    meta.appendChild(lenSpan);
    const tagRow = document.createElement('div');
    tagRow.className = 'tag-row';
    ['#daily','#photo','#감성','#일상','#ootd','#맛집','#여행','#카페'].forEach(tag => {
      const chip = document.createElement('span');
      chip.className = 'tag-chip';
      chip.textContent = tag;
      chip.addEventListener('click', () => {
        post.caption = (post.caption + ' ' + tag).trim();
        box.value = post.caption;
        lenSpan.textContent = post.caption.length + '/2200';
      });
      tagRow.appendChild(chip);
    });
    area.appendChild(box);
    area.appendChild(meta);
    area.appendChild(tagRow);
    body.appendChild(area);
  }
}

// ── Delete post ───────────────────────────────────────
document.getElementById('btn-del-post').addEventListener('click', () => {
  if (!confirm('이 게시물을 삭제할까요?')) return;
  posts.splice(selPostIdx, 1);
  selPostIdx = -1;
  closeSheet();
  showToast('게시물이 삭제됐어요');
});

// ── Page switch ───────────────────────────────────────
function switchPage(page) {
  document.getElementById('page-feed').style.display    = page === 'feed'    ? 'flex' : 'none';
  document.getElementById('page-profile').style.display = page === 'profile' ? 'flex' : 'none';
  document.getElementById('ntab-feed').classList.toggle('active',    page === 'feed');
  document.getElementById('ntab-profile').classList.toggle('active', page === 'profile');
}

// ── Save / Load ───────────────────────────────────────
function saveToStorage() {
  try {
    localStorage.setItem('ig4', JSON.stringify({
      posts,
      username: document.getElementById('bio-name').value,
      bio: document.getElementById('bio-desc').value,
      idCounter
    }));
    showToast('저장 완료 ✓');
  } catch(e) { showToast('저장 실패 (사진이 너무 많거나 용량이 커요)'); }
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem('ig4');
    if (!raw) { showToast('저장된 데이터가 없어요'); return; }
    const data = JSON.parse(raw);
    posts = data.posts || [];
    if (data.idCounter) idCounter = data.idCounter;
    if (data.username) document.getElementById('bio-name').value = data.username;
    if (data.bio) document.getElementById('bio-desc').value = data.bio;
    renderAll();
    showToast('불러오기 완료 ✓');
  } catch(e) { showToast('불러오기 실패'); }
}

// ── Trigger file input ────────────────────────────────
function triggerAdd() { document.getElementById('file-main').click(); }

// ── Wire up buttons ───────────────────────────────────
document.getElementById('btn-save').addEventListener('click', saveToStorage);
document.getElementById('btn-load').addEventListener('click', loadFromStorage);
document.getElementById('bnav-add').addEventListener('click', triggerAdd);
document.getElementById('bnav-feed').addEventListener('click', () => switchPage('feed'));
document.getElementById('bnav-profile').addEventListener('click', () => switchPage('profile'));
document.getElementById('ntab-feed').addEventListener('click', () => switchPage('feed'));
document.getElementById('ntab-profile').addEventListener('click', () => switchPage('profile'));
document.getElementById('story-add').addEventListener('click', triggerAdd);
document.getElementById('bio-name').addEventListener('input', renderAll);
document.getElementById('sheet-overlay').addEventListener('click', closeSheet);
document.getElementById('sheet-close').addEventListener('click', closeSheet);
document.getElementById('sheet-done').addEventListener('click', () => { closeSheet(); showToast('편집 완료 ✓'); });
document.querySelectorAll('.stab').forEach(btn => {
  btn.addEventListener('click', () => {
    sheetTab = btn.dataset.tab;
    document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderSheetBody();
  });
});

// ── Init ──────────────────────────────────────────────
renderAll();
</script>

<script>
// ── Highlights ────────────────────────────────────────
var highlights = [];
var editingHlIdx = -1;
var hlViewerIdx = -1;
var hlSlideIdx = 0;
var hlTimer = null;
var hlSelectedIds = [];
var HL_DURATION = 4000;

function renderHighlights() {
  var bar = document.getElementById('hl-bar');
  if (!bar) return;
  bar.innerHTML = '';

  var addBtn = document.createElement('div');
  addBtn.className = 'hl-item';
  addBtn.innerHTML = '<div class="hl-add"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div><span class="hl-name" style="color:var(--muted);font-size:11px">새 하이라이트</span>';
  addBtn.addEventListener('click', function() { openHlEdit(-1); });
  bar.appendChild(addBtn);

  highlights.forEach(function(hl, hi) {
    var item = document.createElement('div');
    item.className = 'hl-item';
    var ring = document.createElement('div');
    ring.className = 'hl-ring';
    if (hl.coverSrc) {
      var img = document.createElement('img');
      img.src = hl.coverSrc;
      ring.appendChild(img);
    } else {
      ring.innerHTML = '<span class="hl-empty-ico">★</span>';
    }
    var name = document.createElement('span');
    name.className = 'hl-name';
    name.textContent = hl.name || '하이라이트';

    var pressTimer;
    item.addEventListener('pointerdown', function() { pressTimer = setTimeout(function() { openHlEdit(hi); }, 600); });
    item.addEventListener('pointerup',    function() { clearTimeout(pressTimer); });
    item.addEventListener('pointerleave', function() { clearTimeout(pressTimer); });
    item.addEventListener('click', function() { openHlViewer(hi); });

    item.appendChild(ring);
    item.appendChild(name);
    bar.appendChild(item);
  });
}

function getHlPhotos(hl) {
  var allPhotos = posts.reduce(function(acc, p) { return acc.concat(p.photos); }, []);
  if (hl.photoIds && hl.photoIds.length) {
    return hl.photoIds.map(function(id) {
      return allPhotos.find(function(ph) { return ph.id === id; });
    }).filter(Boolean);
  }
  return [];
}

function openHlViewer(hi) {
  var hl = highlights[hi];
  if (!hl) return;
  var photos = getHlPhotos(hl);
  if (!photos.length) { showToast('사진을 먼저 추가해주세요'); return; }
  hlViewerIdx = hi;
  hlSlideIdx = 0;
  document.getElementById('hl-viewer').classList.add('open');
  document.getElementById('hl-viewer-name').textContent = hl.name || '하이라이트';
  renderHlViewer();
  startHlTimer();
}

function renderHlViewer() {
  var hl = highlights[hlViewerIdx];
  if (!hl) return;
  var photos = getHlPhotos(hl);
  var bar = document.getElementById('hl-progress-bar');
  bar.innerHTML = '';
  photos.forEach(function(_, i) {
    var seg = document.createElement('div');
    seg.className = 'hl-progress-seg';
    var fill = document.createElement('div');
    fill.className = 'hl-progress-fill';
    fill.id = 'hl-fill-' + i;
    seg.appendChild(fill);
    bar.appendChild(seg);
  });
  for (var i = 0; i < hlSlideIdx; i++) {
    var f = document.getElementById('hl-fill-' + i);
    if (f) f.style.width = '100%';
  }
  var cur = document.getElementById('hl-fill-' + hlSlideIdx);
  if (cur) {
    cur.style.transition = 'none';
    cur.style.width = '0%';
    requestAnimationFrame(function() {
      cur.style.transition = 'width ' + HL_DURATION + 'ms linear';
      cur.style.width = '100%';
    });
  }
  var ph = photos[hlSlideIdx];
  document.getElementById('hl-viewer-img').src = ph ? ph.src : '';
  var ava = document.getElementById('hl-viewer-ava');
  ava.innerHTML = '';
  if (hl.coverSrc) {
    var img = document.createElement('img');
    img.src = hl.coverSrc;
    ava.appendChild(img);
  }
}

function startHlTimer() {
  clearTimeout(hlTimer);
  hlTimer = setTimeout(hlNextSlide, HL_DURATION);
}

function hlNextSlide() {
  var hl = highlights[hlViewerIdx];
  if (!hl) return;
  var photos = getHlPhotos(hl);
  if (hlSlideIdx < photos.length - 1) {
    hlSlideIdx++;
    renderHlViewer();
    startHlTimer();
  } else {
    closeHlViewer();
  }
}

function hlPrevSlide() {
  if (hlSlideIdx > 0) {
    hlSlideIdx--;
    renderHlViewer();
    startHlTimer();
  }
}

function closeHlViewer() {
  clearTimeout(hlTimer);
  document.getElementById('hl-viewer').classList.remove('open');
}

function openHlEdit(hi) {
  editingHlIdx = hi;
  var hl = hi >= 0 ? highlights[hi] : null;
  document.getElementById('hl-sheet-title').textContent = hl ? '하이라이트 편집' : '새 하이라이트';
  document.getElementById('hl-name-input').value = hl ? hl.name : '';
  renderHlPhotoGrid(hl ? hl.photoIds : []);
  document.getElementById('hl-overlay').classList.add('open');
  document.getElementById('hl-edit-sheet').classList.add('open');
}

function closeHlEdit() {
  document.getElementById('hl-overlay').classList.remove('open');
  document.getElementById('hl-edit-sheet').classList.remove('open');
}

function renderHlPhotoGrid(selectedIds) {
  hlSelectedIds = selectedIds ? selectedIds.slice() : [];
  var grid = document.getElementById('hl-photo-grid');
  grid.innerHTML = '';
  var allPhotos = posts.reduce(function(acc, p) { return acc.concat(p.photos); }, []);
  if (!allPhotos.length) {
    grid.innerHTML = '<div style="padding:32px;text-align:center;color:var(--muted);font-size:13px;grid-column:1/-1">피드에 사진을 먼저 추가해주세요</div>';
    return;
  }
  allPhotos.forEach(function(ph) {
    var cell = document.createElement('div');
    cell.className = 'hpg-cell' + (hlSelectedIds.indexOf(ph.id) >= 0 ? ' selected' : '');
    var img = document.createElement('img');
    img.src = ph.src;
    cell.appendChild(img);
    cell.addEventListener('click', function() {
      var idx = hlSelectedIds.indexOf(ph.id);
      if (idx >= 0) {
        hlSelectedIds.splice(idx, 1);
        cell.classList.remove('selected');
      } else {
        hlSelectedIds.push(ph.id);
        cell.classList.add('selected');
      }
    });
    grid.appendChild(cell);
  });
}

function saveHlEdit() {
  var name = document.getElementById('hl-name-input').value.trim() || '하이라이트';
  var allPhotos = posts.reduce(function(acc, p) { return acc.concat(p.photos); }, []);
  var firstPh = allPhotos.find(function(ph) { return hlSelectedIds.indexOf(ph.id) >= 0; });
  var coverSrc = firstPh ? firstPh.src : null;
  if (editingHlIdx >= 0) {
    highlights[editingHlIdx].name = name;
    highlights[editingHlIdx].photoIds = hlSelectedIds.slice();
    highlights[editingHlIdx].coverSrc = coverSrc;
  } else {
    highlights.push({ id: newId(), name: name, photoIds: hlSelectedIds.slice(), coverSrc: coverSrc });
  }
  closeHlEdit();
  renderHighlights();
  showToast('하이라이트 저장됨 ✓');
}

document.getElementById('hl-viewer-close').addEventListener('click', closeHlViewer);
document.getElementById('hl-tap-prev').addEventListener('click', hlPrevSlide);
document.getElementById('hl-tap-next').addEventListener('click', hlNextSlide);
document.getElementById('hl-sheet-close').addEventListener('click', closeHlEdit);
document.getElementById('hl-sheet-done').addEventListener('click', saveHlEdit);
document.getElementById('hl-overlay').addEventListener('click', closeHlEdit);

renderHighlights();
</script>

<script>
// ── Pre-post Editor ──────────────────────────────────
const SONGS = [
  {title:'YOUNG DRUG',      artist:'CIFIKA',         emoji:'🎸', bg:'linear-gradient(135deg,#667eea,#764ba2)'},
  {title:'Messy P',         artist:'grgr_playlist',  emoji:'🎺', bg:'linear-gradient(135deg,#f093fb,#f5576c)'},
  {title:'제주도의 푸른 밤',  artist:'태연',            emoji:'🌊', bg:'linear-gradient(135deg,#4facfe,#00f2fe)'},
  {title:'밤양갱',           artist:'비비 (BIBI)',     emoji:'🌙', bg:'linear-gradient(135deg,#43e97b,#38f9d7)'},
  {title:'Supernova',       artist:'에스파 (aespa)',   emoji:'⭐', bg:'linear-gradient(135deg,#fa709a,#fee140)'},
  {title:'Magnetic',        artist:'ILLIT',           emoji:'💫', bg:'linear-gradient(135deg,#a18cd1,#fbc2eb)'},
  {title:'Love wins all',   artist:'아이유 (IU)',      emoji:'💛', bg:'linear-gradient(135deg,#fda085,#f6d365)'},
  {title:'Greedy',          artist:'Ariana Grande',   emoji:'🎀', bg:'linear-gradient(135deg,#f77062,#fe5196)'},
  {title:'Espresso',        artist:'Sabrina Carpenter',emoji:'☕', bg:'linear-gradient(135deg,#c2885b,#6f4e37)'},
  {title:'Birds of a Feather',artist:'Billie Eilish', emoji:'🐦', bg:'linear-gradient(135deg,#96fbc4,#f9f586)'},
];

const RATIOS = [
  {id:'orig',  label:'원본',      w:56, h:44},
  {id:'1:1',   label:'1:1',       w:52, h:52},
  {id:'4:5',   label:'4:5',       w:44, h:55},
  {id:'9:16',  label:'9:16',      w:36, h:64},
  {id:'16:9',  label:'16:9',      w:64, h:36},
  {id:'3:4',   label:'3:4',       w:44, h:58},
  {id:'2:3',   label:'2:3',       w:40, h:60},
];

let prePhotos = [];       // temp photos being edited
let preSelIdx = 0;        // which photo is selected
let preTool = 'crop';     // active tool
let preCaption = '';
let preMusic = null;

function openPreEditor(photos) {
  prePhotos = photos;
  preSelIdx = 0;
  preTool = 'crop';
  preCaption = '';
  preMusic = null;

  document.getElementById('pre-step-edit').style.display = 'flex';
  document.getElementById('pre-step-caption').style.display = 'none';
  document.getElementById('pre-editor').classList.add('open');
  document.getElementById('pre-step-label').textContent = '편집';

  renderPreThumbStrip();
  renderPreMainPhoto();
  renderPrePanel();
}

function closePreEditor() {
  document.getElementById('pre-editor').classList.remove('open');
  prePhotos = [];
}

function renderPreMainPhoto() {
  var ph = prePhotos[preSelIdx];
  if (!ph) return;
  var img = document.getElementById('pre-main-img');
  img.src = ph.src;
  img.style.filter = cssFilter(ph);
  img.style.transform = ph.cropScale && ph.cropScale !== 100
    ? 'scale(' + (ph.cropScale/100) + ') translate(' + (ph.cropX||0) + 'px,' + (ph.cropY||0) + 'px)'
    : '';

  // Apply ratio to the container
  var main = document.getElementById('pre-photo-main');
  var ratio = ph.cropRatio || '1:1';
  var ratioMap = {'orig':'auto','1:1':'1','4:5':'4/5','9:16':'9/16','16:9':'16/9','3:4':'3/4','2:3':'2/3'};
  main.style.aspectRatio = ratioMap[ratio] || '1';
  main.style.maxHeight = (ratio === '9:16' || ratio === '2:3') ? '70vh' : 'none';
}

function renderPreThumbStrip() {
  var strip = document.getElementById('pre-thumb-strip');
  strip.innerHTML = '';
  prePhotos.forEach(function(ph, i) {
    var thumb = document.createElement('div');
    thumb.className = 'pre-thumb' + (i === preSelIdx ? ' active' : '');
    var img = document.createElement('img');
    img.src = ph.src;
    img.style.filter = cssFilter(ph);
    thumb.appendChild(img);
    thumb.addEventListener('click', function() {
      preSelIdx = i;
      renderPreThumbStrip();
      renderPreMainPhoto();
      renderPrePanel();
    });
    strip.appendChild(thumb);
  });
  // Add more button
  var addBtn = document.createElement('div');
  addBtn.className = 'pre-thumb-add';
  addBtn.textContent = '+';
  addBtn.title = '사진 추가';
  addBtn.addEventListener('click', function() { document.getElementById('file-add').click(); });
  strip.appendChild(addBtn);
}

function renderPrePanel() {
  var ph = prePhotos[preSelIdx];
  if (!ph) return;
  var panel = document.getElementById('pre-panel');
  panel.innerHTML = '';

  // Highlight active tool
  document.querySelectorAll('.pre-tool-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tool === preTool);
  });

  if (preTool === 'crop') {
    var ratioGrid = document.createElement('div');
    ratioGrid.className = 'ratio-grid';
    RATIOS.forEach(function(r) {
      var item = document.createElement('div');
      item.className = 'ratio-item' + ((ph.cropRatio || '1:1') === r.id ? ' active' : '');
      var box = document.createElement('div');
      box.className = 'ratio-box';
      box.style.width = r.w + 'px';
      box.style.height = r.h + 'px';
      var label = document.createElement('div');
      label.className = 'ratio-label';
      label.textContent = r.label;
      item.appendChild(box);
      item.appendChild(label);
      item.addEventListener('click', function() {
        ph.cropRatio = r.id;
        ph.cropX = 0; ph.cropY = 0;
        renderPrePanel();
        renderPreMainPhoto();
        renderPreThumbStrip();
      });
      ratioGrid.appendChild(item);
    });
    panel.appendChild(ratioGrid);

    // Scale slider
    var scaleWrap = document.createElement('div');
    scaleWrap.style.padding = '8px 16px 14px';
    var scaleTop = document.createElement('div');
    scaleTop.style.cssText = 'display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.6);margin-bottom:6px;';
    var scaleVal = document.createElement('span');
    scaleVal.textContent = (ph.cropScale || 100) + '%';
    scaleTop.innerHTML = '<span>확대/축소</span>';
    scaleTop.appendChild(scaleVal);
    var scaleSlider = document.createElement('input');
    scaleSlider.type = 'range'; scaleSlider.className = 'pre-range';
    scaleSlider.min = 100; scaleSlider.max = 300; scaleSlider.value = ph.cropScale || 100;
    scaleSlider.addEventListener('input', function() {
      ph.cropScale = +this.value;
      scaleVal.textContent = this.value + '%';
      renderPreMainPhoto();
    });
    scaleWrap.appendChild(scaleTop);
    scaleWrap.appendChild(scaleSlider);
    panel.appendChild(scaleWrap);

  } else if (preTool === 'filter') {
    var strip2 = document.createElement('div');
    strip2.className = 'pre-filter-strip';
    FILTERS.forEach(function(f) {
      var fi = document.createElement('div');
      fi.className = 'pre-fi' + (ph.filter === f.css ? ' active' : '');
      var thumb2 = document.createElement('div');
      thumb2.className = 'pre-fi-thumb';
      var img2 = document.createElement('img');
      img2.src = ph.src;
      img2.style.filter = f.css === 'none' ? 'none' : f.css;
      thumb2.appendChild(img2);
      var name2 = document.createElement('div');
      name2.className = 'pre-fi-name';
      name2.textContent = f.name;
      fi.appendChild(thumb2); fi.appendChild(name2);
      fi.addEventListener('click', function() {
        ph.filter = f.css;
        renderPrePanel();
        renderPreMainPhoto();
        renderPreThumbStrip();
      });
      strip2.appendChild(fi);
    });
    panel.appendChild(strip2);

  } else if (preTool === 'music') {
    var musicWrap2 = document.createElement('div');
    musicWrap2.style.cssText = 'padding:12px 16px;';

    // Current music banner
    if (preMusic) {
      var curBanner = document.createElement('div');
      curBanner.style.cssText = 'display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;margin-bottom:10px;';
      var discCur = document.createElement('div');
      discCur.style.cssText = 'width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(255,255,255,.15);flex-shrink:0;';
      discCur.textContent = preMusic.emoji;
      var infoCur = document.createElement('div');
      infoCur.style.flex = '1';
      infoCur.innerHTML = '<div style="color:#fff;font-size:13px;font-weight:600;">' + esc(preMusic.title) + '</div><div style="color:rgba(255,255,255,.5);font-size:11px;">' + esc(preMusic.artist) + '</div>';
      var rmCur = document.createElement('button');
      rmCur.style.cssText = 'background:none;border:none;color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;padding:0 4px;';
      rmCur.textContent = '×';
      rmCur.addEventListener('click', function() { preMusic = null; renderPrePanel(); });
      curBanner.appendChild(discCur); curBanner.appendChild(infoCur); curBanner.appendChild(rmCur);
      musicWrap2.appendChild(curBanner);
    }

    var searchWrap = document.createElement('div');
    searchWrap.style.cssText = 'display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border-radius:10px;padding:8px 12px;margin-bottom:10px;';
    searchWrap.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
    var searchIn = document.createElement('input');
    searchIn.placeholder = '노래 검색...';
    searchIn.style.cssText = 'flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:var(--font);font-size:13px;';
    searchWrap.appendChild(searchIn);
    musicWrap2.appendChild(searchWrap);

    var songList = document.createElement('div');

    function renderSongList(q) {

      var filtered = q ? SONGS.filter(function(s) {

      }) : SONGS;
      filtered.forEach(function(song) {

        item2.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);';
        var disc2 = document.createElement('div');
        disc2.style.cssText = 'width:38px;height:38px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;';
        disc2.style.background = song.bg;
        disc2.textContent = song.emoji;
        var info2 = document.createElement('div');
        info2.style.flex = '1';
        info2.innerHTML = '<div style="color:#fff;font-size:13px;font-weight:600;">' + esc(song.title) + '</div><div style="color:rgba(255,255,255,.5);font-size:11px;">' + esc(song.artist) + '</div>';
        var sel2 = document.createElement('div');
        sel2.style.cssText = 'color:#0095f6;font-size:16px;font-weight:700;width:20px;text-align:center;';
        sel2.textContent = preMusic && preMusic.title === song.title ? '✓' : '';
        item2.appendChild(disc2); item2.appendChild(info2); item2.appendChild(sel2);
        item2.addEventListener('click', function() {
          preMusic = {title:song.title, artist:song.artist, emoji:song.emoji};
          renderPrePanel();
        });
        songList.appendChild(item2);
      });
    }

    searchIn.addEventListener('input', function() { renderSongList(this.value); });
    renderSongList('');
    panel.appendChild(musicWrap2);
  }
}

// ── Tool button switching ─────────────────────────────
document.querySelectorAll('.pre-tool-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    preTool = this.dataset.tool;
    renderPrePanel();
  });
});

// ── Next → Caption step ───────────────────────────────
document.getElementById('pre-inline-caption').addEventListener('input', function() {
  preCaption = this.value;
  var capArea = document.getElementById('pre-cap-textarea');
  if (capArea) capArea.value = preCaption;
});

document.getElementById('pre-next-btn').addEventListener('click', function() {
  preCaption = document.getElementById('pre-inline-caption').value;
  document.getElementById('pre-step-edit').style.display = 'none';
  document.getElementById('pre-step-caption').style.display = 'flex';
  document.getElementById('pre-step-caption').style.flexDirection = 'column';
  document.getElementById('pre-step-label').textContent = '캡션';
  // Show cover photo
  var cover = prePhotos[0];
  var capImg = document.getElementById('pre-cap-img');
  capImg.src = cover.src;
  capImg.style.filter = cssFilter(cover);
  document.getElementById('pre-cap-textarea').value = preCaption;
  updateMusicLabel();
});

// ── Back ──────────────────────────────────────────────
document.getElementById('pre-back-btn').addEventListener('click', function() {
  document.getElementById('pre-step-edit').style.display = 'flex';
  document.getElementById('pre-step-caption').style.display = 'none';
});

// ── Cancel ────────────────────────────────────────────
document.getElementById('pre-cancel').addEventListener('click', closePreEditor);

// ── Caption textarea ──────────────────────────────────
document.getElementById('pre-cap-textarea').addEventListener('input', function() {
  preCaption = this.value;
});

// ── Share → add to feed ───────────────────────────────
document.getElementById('pre-share-btn').addEventListener('click', function() {
  var newPost = makePost(prePhotos);
  newPost.caption = preCaption;
  newPost.music = preMusic;
  posts.unshift(newPost);
  renderAll();
  closePreEditor();
  showToast(prePhotos.length + '장 게시물 업로드됨 ✓');
  preCaption = '';
  preMusic = null;
});

// ── Music picker ──────────────────────────────────────
function updateMusicLabel() {
  var label = document.getElementById('pre-music-label');
  if (preMusic) {
    label.textContent = preMusic.emoji + '  ' + preMusic.title + ' · ' + preMusic.artist;
    label.classList.add('pre-music-selected');
  } else {
    label.textContent = '음악 추가';
    label.classList.remove('pre-music-selected');
  }
}

document.getElementById('pre-music-row').addEventListener('click', function() {
  document.getElementById('music-picker').classList.add('open');
  renderMusicPickerList('');
});
document.getElementById('music-picker-back').addEventListener('click', function() {
  document.getElementById('music-picker').classList.remove('open');
});
document.getElementById('music-picker-input').addEventListener('input', function() {
  renderMusicPickerList(this.value);
});

function renderMusicPickerList(query) {
  var list = document.getElementById('music-picker-list');
  list.innerHTML = '';
  var filtered = query
    ? SONGS.filter(function(s) { return s.title.toLowerCase().includes(query.toLowerCase()) || s.artist.toLowerCase().includes(query.toLowerCase()); })
    : SONGS;
  filtered.forEach(function(song) {
    var item = document.createElement('div');
    item.className = 'mp-item';
    var disc = document.createElement('div');
    disc.className = 'mp-disc';
    disc.style.background = song.bg;
    disc.textContent = song.emoji;
    var info = document.createElement('div');
    info.className = 'mp-info';
    info.innerHTML = '<div class="mp-title">' + esc(song.title) + '</div><div class="mp-artist">' + esc(song.artist) + '</div>';
    var check = document.createElement('div');
    check.className = 'mp-check';
    check.textContent = preMusic && preMusic.title === song.title ? '✓' : '';
    item.appendChild(disc); item.appendChild(info); item.appendChild(check);
    item.addEventListener('click', function() {
      preMusic = {title: song.title, artist: song.artist, emoji: song.emoji};
      document.getElementById('music-picker').classList.remove('open');
      updateMusicLabel();
    });
    list.appendChild(item);
  });
}

// file-add during pre-editor
document.getElementById('file-add').addEventListener('change', function(e) {
  // If pre-editor is open, add to prePhotos
  if (document.getElementById('pre-editor').classList.contains('open')) {
    var files = [...this.files].filter(function(f) { return f.type.startsWith('image/'); }).slice(0, 20 - prePhotos.length);
    readFilesAsSrcs(files, function(srcs) {
      srcs.forEach(function(s) { prePhotos.push(makePhoto(s)); });
      renderPreThumbStrip();
    });
    this.value = ''; return;
  }
  // Otherwise existing sheet logic
  if (selPostIdx < 0) { this.value = ''; return; }
  var post2 = posts[selPostIdx];
  var maxAdd = 20 - post2.photos.length;
  if (maxAdd <= 0) { showToast('최대 20장까지 추가할 수 있어요'); this.value = ''; return; }
  var files2 = [...this.files].filter(function(f) { return f.type.startsWith('image/'); }).slice(0, maxAdd);
  readFilesAsSrcs(files2, function(srcs) {
    srcs.forEach(function(s) { post2.photos.push(makePhoto(s)); });
    document.getElementById('sheet-title').textContent = '게시물 편집 (' + post2.photos.length + '장)';
    renderStrip();
    showToast('+' + files2.length + '장 추가됨');
  });
  this.value = '';
});
</script>

</body>
</html>
